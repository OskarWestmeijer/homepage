server {
  listen 80;
  listen [::]:80;
  http2 on;

  root   /usr/share/nginx/html;
  index  index.html;

  # SvelteKit's adapter-static uses trailingSlash: 'never', so canonical
  # pages are emitted as e.g. projects.html, not projects/index.html.
  # Some routes (e.g. /projects) also have a same-named static-asset
  # directory (no index.html in it). Without this normalization, a
  # trailing-slash request resolves to that directory and 403s before
  # try_files ever reaches the SPA fallback.
  rewrite ^/(.+)/$ /$1 permanent;

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
